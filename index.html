<!DOCTYPE html>
<html>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<script>
    function myFunction() {
        var x = document.getElementById("myTopnav");
        if (x.className === "topnav") {
            x.className += " responsive";
        } else {
            x.className = "topnav";
        }
    }
</script>

<style>
	html {
		overflow-y: scroll;
	}

	.container {
		padding-right: 1em;
		padding-left: 1em;
		margin-right: auto;
		margin-left: auto;
		top: 0;
		left: 0;
		max-width: 48em;
		word-wrap: break-word;
	}

	.tab {
		text-indent: 2em;
	}

	.topnav {
	  overflow: hidden;
	  width: 100%;
	  top: 0;
	}

	hr.nav {
		margin: 0px -1.25em 1.25em;
		margin-top: .35em;
		border: 0;
		border-top: .0625em solid #d9d9d9;

	}

	.topnav a {
	  float: left;
		display: block;
		color: #505050;
		text-align: center;
		text-decoration: none;
		font-size: 1.5em;
		font-family: Arial, Helvetica, sans-serif;
		font-weight: 700;
		margin-top: 0.8em;
		margin-left: 1.25em;
	}

	.topnav a:hover:not(.active) {
	  color: #4166f5;
	}

	.topnav a.active {
		font-size: 2em;
		font-weight: 700;
		padding-top: 0.375em;
		margin: 0px;
	}

	.topnav .icon {
	  display: none;
	}

	@media screen and (max-width: 37.5em) {
	  .topnav a:not(:first-child) {display: none;}
	  .topnav a.icon {
		float: right;
		display: block;
	  }
	}

	@media screen and (max-width: 37.5em) {
	  .topnav.responsive {position: relative;}
	  .topnav.responsive .icon {
		position: absolute;
		right: 0;
		top: 0;
	  }
	  .topnav.responsive a {
		float: none;
		display: block;
		text-align: left;
	  }
	}
</style>

<body style="margin: 0px;">

    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <head>


    </head>


    <div class=container>
        <div class="topnav" id="myTopnav">
            <a class="active">Cameron McGinley</a>
			<a href="#">Test</a>
			<a href="#">Test2</a>
            <a href="javascript:void(0);" class="icon" onclick="myFunction()">
                <i class="fa fa-bars"></i>
            </a>
        </div>
    </div>
    <hr class=nav>


    <div class=container style="margin-top: 2.5em">
        <!-- Main body text-->
        Sample
    </div>
</body>

</html>
